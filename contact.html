<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Hema Portfolio</title>

  <meta name="description"
    content="Contact Hema through this accessible portfolio contact form.">
  <meta name="author" content="Hema">

  <link rel="canonical" href="https://hema-portfolio.example.com/contact.html">
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Contact | Hema Portfolio">
  <meta property="og:description" content="Contact Hema through this accessible portfolio contact form.">
  <meta property="og:url"         content="https://hema-portfolio.example.com/contact.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@400;500&display=swap"
    media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@400;500&display=swap"></noscript>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <a href="#main-content" class="skip-link">Skip to Main Content</a>

  <header role="banner">
    <h1>Hema Portfolio</h1>
    <nav role="navigation" aria-label="Main Navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content" role="main">
    <div class="page-wrapper">

      <div class="page-hero">
        <p class="section-label">Reach Out</p>
        <h2>Contact Me</h2>
      </div>

      <section aria-labelledby="contact-heading">
        <h2 id="contact-heading" class="sr-only">Get In Touch</h2>

        <div class="contact-layout">

          <div class="contact-info">
            <p class="section-label">Get In Touch</p>
            <p>Fill out the form below to contact me.</p>
          </div>

          <form aria-label="Contact Form" novalidate>

            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name"
                autocomplete="name" placeholder="Your name"
                required aria-required="true">
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email"
                autocomplete="email" placeholder="you@example.com"
                required aria-required="true">
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="6"
                placeholder="What's on your mind?"
                required aria-required="true"></textarea>
            </div>

            <button type="submit">Send Message</button>

          </form>

        </div>
      </section>

    </div>
  </main>

  <footer role="contentinfo">
    <p>&copy; 2026 Hema Portfolio</p>
  </footer>

</body>
</html>
